<svg viewBox="0 0 360 170" xmlns="http://www.w3.org/2000/svg" role="img"
           aria-label="Tom and Anna playing with a ball in the park">
        <defs>
          <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#bae6fd"/>
            <stop offset="1" stop-color="#e0f2fe"/>
          </linearGradient>
        </defs>

        <!-- 天空 + 草地 -->
        <rect x="0" y="0" width="360" height="170" fill="url(#sky)"/>
        <rect x="0" y="128" width="360" height="42" fill="#86efac"/>
        <rect x="0" y="128" width="360" height="6" fill="#4ade80"/>

        <!-- 太陽 -->
        <g transform="translate(312,30)">
          <g class="rays">
            <g stroke="#fbbf24" stroke-width="3" stroke-linecap="round">
              <line x1="0" y1="-26" x2="0" y2="-20"/>
              <line x1="0" y1="26" x2="0" y2="20"/>
              <line x1="-26" y1="0" x2="-20" y2="0"/>
              <line x1="26" y1="0" x2="20" y2="0"/>
              <line x1="-18" y1="-18" x2="-14" y2="-14"/>
              <line x1="18" y1="18" x2="14" y2="14"/>
              <line x1="-18" y1="18" x2="-14" y2="14"/>
              <line x1="18" y1="-18" x2="14" y2="-14"/>
            </g>
          </g>
          <circle r="15" fill="#fde047"/>
        </g>

        <!-- 雲 -->
        <g class="cloud1" fill="#ffffff" opacity="0.9">
          <ellipse cx="40" cy="34" rx="20" ry="12"/>
          <ellipse cx="58" cy="34" rx="16" ry="10"/>
          <ellipse cx="26" cy="38" rx="14" ry="9"/>
        </g>
        <g class="cloud2" fill="#ffffff" opacity="0.8">
          <ellipse cx="150" cy="58" rx="16" ry="9"/>
          <ellipse cx="164" cy="58" rx="12" ry="8"/>
        </g>

        <!-- 小樹 -->
        <g class="tree">
          <rect x="22" y="96" width="8" height="34" rx="3" fill="#92400e"/>
          <circle cx="26" cy="86" r="20" fill="#22c55e"/>
          <circle cx="13" cy="94" r="13" fill="#16a34a"/>
          <circle cx="39" cy="94" r="13" fill="#16a34a"/>
        </g>

        <!-- Tom（男生，左邊） -->
        <g transform="translate(78,50)">
          <g class="bob-a">
            <!-- 對話泡泡 Hi! -->
            <g class="talkA">
              <path d="M34,-3 L30,5 L42,-2 Z" fill="#fff" stroke="#2563eb" stroke-width="1.5"/>
              <rect x="26" y="-24" width="40" height="22" rx="11" fill="#fff" stroke="#2563eb" stroke-width="1.5"/>
              <text x="46" y="-9" font-size="11" font-weight="700" fill="#2563eb" text-anchor="middle">Hi!</text>
            </g>
            <!-- 影子 -->
            <ellipse cx="20" cy="80" rx="15" ry="3" fill="#000" opacity="0.10"/>
            <!-- 腿 -->
            <rect x="13" y="60" width="6" height="14" rx="3" fill="#ffe0bd"/>
            <rect x="21" y="60" width="6" height="14" rx="3" fill="#ffe0bd"/>
            <!-- 鞋子 -->
            <rect x="10" y="73" width="11" height="6" rx="3" fill="#ef4444"/>
            <rect x="19" y="73" width="11" height="6" rx="3" fill="#ef4444"/>
            <!-- 短褲 -->
            <rect x="9" y="50" width="22" height="12" rx="4" fill="#1e3a8a"/>
            <rect x="19.3" y="52" width="1.4" height="9" fill="#172554"/>
            <!-- 上衣 -->
            <rect x="7" y="28" width="26" height="24" rx="9" fill="#2563eb"/>
            <rect x="7" y="39" width="26" height="3.5" fill="#fff" opacity="0.7"/>
            <!-- 手臂 -->
            <rect x="2" y="29" width="8" height="11" rx="4" fill="#2563eb"/>
            <rect x="1.5" y="37" width="6" height="11" rx="3" fill="#ffe0bd" transform="rotate(8 4 42)"/>
            <circle cx="4" cy="49" r="3.3" fill="#ffe0bd"/>
            <rect x="30" y="29" width="8" height="11" rx="4" fill="#2563eb"/>
            <rect x="32.5" y="37" width="6" height="11" rx="3" fill="#ffe0bd" transform="rotate(-8 36 42)"/>
            <circle cx="36" cy="49" r="3.3" fill="#ffe0bd"/>
            <!-- 脖子 -->
            <rect x="16.5" y="24" width="7" height="6" fill="#ffe0bd"/>
            <!-- 頭髮（後）+ 臉 -->
            <circle cx="20" cy="13" r="13" fill="#5b3a1f"/>
            <circle cx="20" cy="15" r="12" fill="#ffe0bd"/>
            <ellipse cx="7.7" cy="15" rx="2" ry="3" fill="#ffe0bd"/>
            <ellipse cx="32.3" cy="15" rx="2" ry="3" fill="#ffe0bd"/>
            <!-- 瀏海 -->
            <path d="M8,12 Q20,2 32,12 Q20,8 8,12 Z" fill="#5b3a1f"/>
            <!-- 腮紅 -->
            <circle cx="11" cy="19" r="2.5" fill="#fca5a5" opacity="0.55"/>
            <circle cx="29" cy="19" r="2.5" fill="#fca5a5" opacity="0.55"/>
            <!-- 眉毛 -->
            <path d="M11.5,11 q2,-1.2 4,0" stroke="#5b3a1f" stroke-width="1.2" fill="none" stroke-linecap="round"/>
            <path d="M24.5,11 q2,-1.2 4,0" stroke="#5b3a1f" stroke-width="1.2" fill="none" stroke-linecap="round"/>
            <!-- 眼睛 -->
            <ellipse cx="14" cy="15" rx="2.2" ry="2.8" fill="#fff"/>
            <circle cx="14.4" cy="15.4" r="1.4" fill="#3b2415"/>
            <ellipse cx="26" cy="15" rx="2.2" ry="2.8" fill="#fff"/>
            <circle cx="25.6" cy="15.4" r="1.4" fill="#3b2415"/>
            <!-- 鼻子 -->
            <path d="M20,15.5 q1.5,2.2 -0.6,3.2" stroke="#e0a878" stroke-width="1.2" fill="none" stroke-linecap="round"/>
            <!-- 嘴巴 -->
            <path d="M15,21 Q20,25 25,21" stroke="#b5503a" stroke-width="1.6" fill="none" stroke-linecap="round"/>
          </g>
        </g>

        <!-- Anna（女生，右邊） -->
        <g transform="translate(238,50)">
          <g class="bob-b">
            <!-- 對話泡泡 Yes! -->
            <g class="talkB">
              <path d="M6,-3 L10,5 L-2,-2 Z" fill="#fff" stroke="#db2777" stroke-width="1.5"/>
              <rect x="-26" y="-24" width="42" height="22" rx="11" fill="#fff" stroke="#db2777" stroke-width="1.5"/>
              <text x="-5" y="-9" font-size="11" font-weight="700" fill="#db2777" text-anchor="middle">Yes!</text>
            </g>
            <!-- 影子 -->
            <ellipse cx="20" cy="80" rx="15" ry="3" fill="#000" opacity="0.10"/>
            <!-- 長髮（後） -->
            <path d="M4,16 Q1,44 7,58 L33,58 Q39,44 36,16 Z" fill="#6b4423"/>
            <!-- 腿 -->
            <rect x="13" y="58" width="6" height="14" rx="3" fill="#ffe0bd"/>
            <rect x="21" y="58" width="6" height="14" rx="3" fill="#ffe0bd"/>
            <!-- 鞋子 -->
            <rect x="10" y="72" width="11" height="6" rx="3" fill="#be185d"/>
            <rect x="19" y="72" width="11" height="6" rx="3" fill="#be185d"/>
            <!-- 洋裝 -->
            <path d="M9,30 Q5,48 2,60 L38,60 Q35,48 31,30 Z" fill="#db2777"/>
            <rect x="9" y="30" width="22" height="7" rx="3" fill="#be185d" opacity="0.45"/>
            <!-- 手臂 -->
            <rect x="2" y="31" width="8" height="10" rx="4" fill="#db2777"/>
            <rect x="1.5" y="38" width="6" height="11" rx="3" fill="#ffe0bd" transform="rotate(8 4 43)"/>
            <circle cx="4" cy="50" r="3.3" fill="#ffe0bd"/>
            <rect x="30" y="31" width="8" height="10" rx="4" fill="#db2777"/>
            <rect x="32.5" y="38" width="6" height="11" rx="3" fill="#ffe0bd" transform="rotate(-8 36 43)"/>
            <circle cx="36" cy="50" r="3.3" fill="#ffe0bd"/>
            <!-- 脖子 -->
            <rect x="16.5" y="24" width="7" height="6" fill="#ffe0bd"/>
            <!-- 辮子（前） -->
            <ellipse cx="4" cy="27" rx="5" ry="10" fill="#6b4423"/>
            <ellipse cx="36" cy="27" rx="5" ry="10" fill="#6b4423"/>
            <circle cx="5" cy="18" r="2" fill="#f472b6"/>
            <circle cx="35" cy="18" r="2" fill="#f472b6"/>
            <!-- 頭髮（後）+ 臉 -->
            <circle cx="20" cy="13" r="13" fill="#6b4423"/>
            <circle cx="20" cy="15" r="12" fill="#ffe0bd"/>
            <ellipse cx="7.7" cy="15" rx="2" ry="3" fill="#ffe0bd"/>
            <ellipse cx="32.3" cy="15" rx="2" ry="3" fill="#ffe0bd"/>
            <!-- 瀏海 -->
            <path d="M7,12 Q20,1 33,12 Q20,7 7,12 Z" fill="#6b4423"/>
            <!-- 蝴蝶結 -->
            <path d="M20,5 L13,2 L13,8 Z" fill="#f472b6"/>
            <path d="M20,5 L27,2 L27,8 Z" fill="#f472b6"/>
            <circle cx="20" cy="5" r="2.2" fill="#ec4899"/>
            <!-- 腮紅 -->
            <circle cx="11" cy="19" r="2.5" fill="#fca5a5" opacity="0.6"/>
            <circle cx="29" cy="19" r="2.5" fill="#fca5a5" opacity="0.6"/>
            <!-- 眼睛 + 睫毛 -->
            <ellipse cx="14" cy="15" rx="2.2" ry="2.9" fill="#fff"/>
            <circle cx="14.4" cy="15.4" r="1.5" fill="#3b2415"/>
            <ellipse cx="26" cy="15" rx="2.2" ry="2.9" fill="#fff"/>
            <circle cx="25.6" cy="15.4" r="1.5" fill="#3b2415"/>
            <path d="M11.5,12.5 q2,-1 4,-0.3" stroke="#3b2415" stroke-width="1" fill="none" stroke-linecap="round"/>
            <path d="M24.5,12.2 q2,-0.7 4,0.3" stroke="#3b2415" stroke-width="1" fill="none" stroke-linecap="round"/>
            <!-- 鼻子 -->
            <path d="M20,15.5 q1.5,2.2 -0.6,3.2" stroke="#e0a878" stroke-width="1.2" fill="none" stroke-linecap="round"/>
            <!-- 嘴巴 -->
            <path d="M15,21 Q20,25 25,21" stroke="#b5503a" stroke-width="1.6" fill="none" stroke-linecap="round"/>
          </g>
        </g>

        <!-- 球：在兩人之間彈來彈去 -->
        <g transform="translate(120,118)">
          <g class="ball-x">
            <g class="ball-y" id="ballY">
              <g class="ball-spin">
                <circle r="10" fill="#f97316"/>
                <path d="M-10,0 A10,10 0 0 1 10,0" stroke="#fff" stroke-width="1.5" fill="none"/>
                <line x1="0" y1="-10" x2="0" y2="10" stroke="#fff" stroke-width="1.5"/>
              </g>
            </g>
          </g>
        </g>
      </svg>
