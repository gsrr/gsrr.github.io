<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Role Play · Test Suite</title>
<style>
  body { font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; background:#f7f9fc; color:#0f172a; max-width:820px; margin:0 auto; padding:20px; }
  h1 { font-size:20px; } a { color:#6366f1; }
  .summary { font-size:16px; font-weight:700; padding:10px 14px; border-radius:10px; margin:12px 0; }
  .summary.ok { background:#dcfce7; color:#166534; } .summary.bad { background:#fee2e2; color:#991b1b; }
  .case { border:1px solid #e2e8f0; border-radius:10px; padding:10px 12px; margin:8px 0; background:#fff; }
  .case .name { font-weight:600; } .case .detail { font-size:13px; color:#64748b; margin-top:4px; font-family:ui-monospace,Menlo,monospace; }
  .tag { font-size:12px; font-weight:700; padding:1px 8px; border-radius:999px; margin-right:8px; }
  .tag.pass { background:#dcfce7; color:#166534; } .tag.fail { background:#fee2e2; color:#991b1b; }
</style>
</head>
<body>
  <h1>🎭 Role Play — Test Suite <a href="index.html" style="font-size:13px">← play</a></h1>
  <div id="out">Running…</div>

  <script src="classifier.js"></script>
  <script src="engine.js"></script>
  <script src="tests.js"></script>
  <script>
    fetch("scenarios/restaurant.json", { cache: "no-cache" })
      .then((r) => r.json())
      .then((graph) => RP.runTests(graph))
      .then((res) => {
        const out = document.getElementById("out");
        const ok = res.passed === res.total;
        out.innerHTML =
          '<div class="summary ' + (ok ? "ok" : "bad") + '">' + res.passed + " / " + res.total + " passed</div>" +
          res.cases.map((c) =>
            '<div class="case"><span class="tag ' + (c.ok ? "pass" : "fail") + '">' + (c.ok ? "PASS" : "FAIL") + "</span>" +
            '<span class="name">' + c.name + '</span><div class="detail">' + c.detail + "</div></div>"
          ).join("");
      })
      .catch((e) => { document.getElementById("out").textContent = "Could not run tests: " + e.message + " (serve via a web server, not file://)."; });
  </script>
</body>
</html>
