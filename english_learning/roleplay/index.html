<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Role Play · At the Restaurant</title>
<style>
  :root { --bg:#f7f9fc; --card:#fff; --ink:#0f172a; --muted:#64748b; --brand:#6366f1; --line:#e2e8f0; }
  * { box-sizing: border-box; }
  body { margin:0; font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--ink); }
  .wrap { max-width:760px; margin:0 auto; padding:16px; }
  .head { text-align:center; margin-bottom:10px; }
  .head h1 { font-size:22px; margin:6px 0 2px; }
  .head .sub { color:var(--muted); font-size:14px; }
  .head .back { display:inline-block; color:var(--brand); text-decoration:none; font-size:13px; }
  .bar { display:flex; flex-wrap:wrap; gap:8px; align-items:center; justify-content:center; margin:10px 0; }
  .bar label { font-size:12px; color:var(--muted); }
  .bar select, .bar button { font:inherit; font-size:13px; padding:6px 10px; border:1px solid var(--line); border-radius:10px; background:#fff; color:var(--ink); cursor:pointer; }
  .status { text-align:center; color:var(--muted); font-size:13px; min-height:18px; margin:4px 0; }

  .convo { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:14px; height:44vh; min-height:280px; overflow-y:auto; }
  .rp-bubble { max-width:82%; margin:8px 0; padding:9px 13px; border-radius:14px; line-height:1.5; animation:pop .18s ease; }
  .rp-bubble .rp-who { display:block; font-size:11px; opacity:.7; margin-bottom:2px; }
  .rp-bubble.npc { background:#eef2ff; border:1px solid #e0e7ff; }
  .rp-bubble.npc.hint { background:#fff7ed; border-color:#fed7aa; }
  .rp-bubble.npc.active { box-shadow:0 0 0 2px #c7d2fe; }
  .rp-bubble.user { background:#dcfce7; border:1px solid #bbf7d0; margin-left:auto; }
  @keyframes pop { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }

  .fb { min-height:22px; text-align:center; font-size:14px; margin:10px 0; padding:8px; border-radius:10px; }
  .fb.pass { background:#dcfce7; color:#166534; }
  .fb.partial { background:#fef9c3; color:#854d0e; }
  .fb.off { background:#fee2e2; color:#991b1b; }

  .inputrow { display:flex; gap:8px; }
  .inputrow input { flex:1; font:inherit; padding:12px 14px; border:1px solid var(--line); border-radius:12px; }
  .inputrow button { font:inherit; font-weight:600; padding:12px 16px; border:0; border-radius:12px; cursor:pointer; }
  #rpSend { background:var(--brand); color:#fff; }
  #rpMic { background:#ef4444; color:#fff; }
  #rpMic.rec { animation:pulse 1s infinite; }
  @keyframes pulse { 50%{opacity:.55} }
  button:disabled { opacity:.45; cursor:not-allowed; }

  /* debug */
  #rpDebug { margin-top:14px; border:1px dashed var(--line); border-radius:12px; overflow:hidden; max-height:0; }
  #rpDebug.open { max-height:none; padding:12px; }
  #rpDebug:not(.open) .dbg-inner { display:none; }
  .dbg-row { display:flex; justify-content:space-between; gap:12px; font-size:13px; padding:3px 0; border-bottom:1px solid #f1f5f9; }
  .dbg-row b { color:var(--muted); font-weight:600; }
  .dbg-grp { font-size:12px; color:var(--muted); margin:6px 0; }
  .dbg-tbl { width:100%; border-collapse:collapse; margin-top:4px; font-size:13px; color:var(--ink); }
  .dbg-tbl th { text-align:left; color:var(--muted); font-weight:600; }
  .dbg-tbl td, .dbg-tbl th { padding:2px 4px; border-bottom:1px solid #f1f5f9; }
  .dbg-tbl tr.sel td { background:#eef2ff; font-weight:700; }
  .pill { padding:1px 8px; border-radius:999px; font-size:11px; font-weight:700; }
  .pill.PASS { background:#dcfce7; color:#166534; }
  .pill.PARTIAL { background:#fef9c3; color:#854d0e; }
  .pill.OFF_TOPIC { background:#fee2e2; color:#991b1b; }
  .tip { text-align:center; font-size:12px; color:var(--muted); margin-top:10px; }
  .tip a { color:var(--brand); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="head">
      <a class="back" href="../index.html">← Back to app</a>
      <h1 id="rpTitle">Role Play</h1>
      <div class="sub" id="rpRoleLine"></div>
    </div>

    <div class="bar">
      <label>Scenario
        <select id="rpScenario"></select>
      </label>
      <label>Classifier
        <select id="rpClassifier">
          <option value="local">local (offline)</option>
          <option value="remote">remote (/api/classify)</option>
        </select>
      </label>
      <label>Branch pick
        <select id="rpStrategy">
          <option value="weighted">weighted random</option>
          <option value="random">random</option>
          <option value="avoidRecent">avoid recent</option>
          <option value="deterministic">deterministic</option>
        </select>
      </label>
      <button id="rpRestart">↻ Restart</button>
      <button id="rpDebugToggle">🐞 Debug</button>
    </div>

    <div class="status" id="rpStatus"></div>
    <div class="convo" id="rpConvo"></div>
    <div class="fb" id="rpFeedback"></div>

    <div class="inputrow">
      <input id="rpText" type="text" placeholder="Type your reply in English…" autocomplete="off">
      <button id="rpSend">Send</button>
      <button id="rpMic">🎤 Speak</button>
    </div>

    <div id="rpDebug"><div class="dbg-inner" id="rpDebugBody"></div></div>

    <p class="tip">Answer freely — the same idea can be said many ways. Voice needs the server (<code>/api/stt</code>); typing works anywhere. See <a href="tests.html">test suite</a>.</p>
  </div>

  <script src="classifier.js"></script>
  <script src="tts.js"></script>
  <script src="stt.js"></script>
  <script src="engine.js"></script>
  <script src="app.js"></script>
</body>
</html>
