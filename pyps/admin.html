<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>管理者後台</title>

<style>
body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont;
  padding: 20px;
}

h2 { margin-bottom: 10px; }

.toolbar {
  margin-bottom: 10px;
}

button {
  margin-right: 8px;
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

th, td {
  border: 1px solid #ddd;
  padding: 6px;
  vertical-align: top;
}

th {
  background: #f5f5f5;
  white-space: nowrap;
}

textarea {
  width: 100%;
  resize: vertical;
  font-size: 13px;
}

details summary {
  cursor: pointer;
  font-weight: bold;
}

.small {
  font-size: 12px;
  color: #666;
}

/* ===== 狀態顏色 ===== */
.paid {
  background: #e6ffed;   /* 淡綠 */
}

.unpaid {
  background: #ffecec;   /* 淡紅 */
}

.dirty {
  background: #fff8d6 !important; /* 淡黃（最高優先） */
}

.saved {
  outline: 2px solid #7adf9a;
}

.status {
  text-align: center;
  width: 60px;
}
</style>
</head>

<body>

<h2>📋 報名管理後台</h2>

<div class="toolbar">
  <button onclick="saveAll()">💾 儲存</button>
  <button onclick="logout()">🚪 登出</button>
  <span id="hint" class="small"></span>
</div>

<table>
<thead>
<tr>
  <th>報名時間</th>
  <th>基本資料</th>
  <th>人員</th>
  <th>便當</th>
  <th>統計</th>
  <th>金額</th>
  <th>已付款</th>
  <th>管理備註</th>
  <th>狀態</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<script>
const ADMIN_TOKEN = prompt("請輸入管理者 Token");
if (!ADMIN_TOKEN) {
  location.href = "/stats.html";
}

function logout() {
  if (Object.keys(dirtyMap).length > 0) {
    if (!confirm("尚有未儲存的變更，確定要登出？")) return;
  }
  sessionStorage.removeItem("ADMIN_TOKEN");
  location.reload();
}

/* =========================
 * API helper
 * ========================= */
async function api(path, options = {}) {
  const res = await fetch(path, {
    ...options,
    headers: {
      "Content-Type": "application/json",
      "x-admin-token": ADMIN_TOKEN
    }
  });
  if (!res.ok) throw new Error("API error");
  return res.json();
}

/* =========================
 * 狀態管理
 * ========================= */
const dirtyMap = {};        // id -> { paid, note }
const originalMap = {};     // id -> { paid, note }

function updateRowColor(tr, paid, isDirty) {
  tr.classList.remove("paid", "unpaid");
  if (isDirty) return;
  tr.classList.add(paid ? "paid" : "unpaid");
}

/* =========================
 * 建立一列
 * ========================= */
function createRow(item) {
  const tr = document.createElement("tr");
  const meta = item.meta || {};

  const original = {
    paid: !!meta.paid,
    note: meta.note || ""
  };
  originalMap[item.createdAt] = original;

  const peopleHtml = (item.people || [])
    .map(p => `${p.name}（${p.type} / ${p.idno} / ${p.birthday || "—"}）`)
    .join("<br>");

  const bentoHtml = Object.entries(item.bento || {})
    .map(([k, v]) => `${k}: ${v}`)
    .join("<br>");

  tr.innerHTML = `
    <td>${item.createdAt}</td>
    <td>
      <b>${item.name}</b><br>
      📞 ${item.phone}<br>
      ✉️ ${item.email}<br>
      🚗 ${item.transport}<br>
      🌐 ${item.ip}
    </td>
    <td>
      <details>
        <summary>人員 (${item.people?.length || 0})</summary>
        ${peopleHtml || "—"}
      </details>
    </td>
    <td>
      <details>
        <summary>便當</summary>
        ${bentoHtml || "—"}
      </details>
    </td>
    <td>
      成人：${item.summary?.adult || 0}<br>
      小孩：${item.summary?.child || 0}<br>
      女生：${item.summary?.female || 0}<br>
      馬年(字)：${item.summary?.horse_free || 0}<br>
    </td>
    <td>${item.total}</td>
    <td style="text-align:center">
      <input type="checkbox" ${original.paid ? "checked" : ""}>
    </td>
    <td>
      <textarea rows="3">${original.note}</textarea>
      <div class="small">${meta.updatedAt || ""}</div>
    </td>
    <td class="status"></td>
  `;

  const checkbox = tr.querySelector("input[type=checkbox]");
  const textarea = tr.querySelector("textarea");

  function updateDirty() {
    const current = {
      paid: checkbox.checked,
      note: textarea.value
    };

    const isDirty =
      current.paid !== original.paid ||
      current.note !== original.note;

    if (isDirty) {
      dirtyMap[item.createdAt] = current;
      tr.classList.add("dirty");
    } else {
      delete dirtyMap[item.createdAt];
      tr.classList.remove("dirty");
    }

    updateRowColor(tr, current.paid, isDirty);

    const count = Object.keys(dirtyMap).length;
    document.getElementById("hint").textContent =
      count > 0 ? `⚠ 尚有 ${count} 筆未儲存` : "";
  }

  checkbox.addEventListener("change", updateDirty);
  textarea.addEventListener("input", updateDirty);

  updateRowColor(tr, original.paid, false);
  return tr;
}

/* =========================
 * 儲存全部
 * ========================= */
async function saveAll() {
  const ids = Object.keys(dirtyMap);
  if (ids.length === 0) {
    alert("沒有需要儲存的變更");
    return;
  }

  for (const id of ids) {
    await api("/api/admin/meta", {
      method: "POST",
      body: JSON.stringify({
        id,
        paid: dirtyMap[id].paid,
        note: dirtyMap[id].note
      })
    });

    // 更新 original
    originalMap[id].paid = dirtyMap[id].paid;
    originalMap[id].note = dirtyMap[id].note;
  }

  // 清除 dirty 標記
  document.querySelectorAll("tr.dirty").forEach(tr => {
    tr.classList.remove("dirty");
    tr.classList.add("saved");
    setTimeout(() => tr.classList.remove("saved"), 1200);
  });

  for (const k in dirtyMap) delete dirtyMap[k];
  document.getElementById("hint").textContent = "";
  alert("✅ 已儲存完成");
}

/* =========================
 * 初始化
 * ========================= */
(async function init() {
  try {
    const list = await api("/api/admin/signup");
    const tbody = document.getElementById("tbody");
    list.forEach(item => tbody.appendChild(createRow(item)));
  } catch {
    alert("Token 驗證失敗");
    logout();
  }
})();
</script>

</body>
</html>
