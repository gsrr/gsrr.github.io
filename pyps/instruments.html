<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>樂器清單</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
    --green:#2d6a4f;
    --accent:#ff6f61;
    --yellow:#ffd166;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
    font-family:'Noto Sans TC',sans-serif;
    background:linear-gradient(180deg,#eaf7ff 0%,#ffffff 45%);
    color:#333;
    line-height:1.8;
}

.hero{
    padding:50px 20px 30px;
    background:linear-gradient(180deg,#7dd3fc 0%,#c7ebff 65%,#fff 100%);
    text-align:center;
}
.hero h1{
    font-size:2.4rem;
    margin-bottom:8px;
}
.hero p{
    font-size:1.1rem;
    color:#555;
}

.container{
    max-width:900px;
    margin:30px auto 90px;
    padding:0 20px;
}
.card{
    background:#fff;
    border-radius:28px;
    padding:40px;
    margin-bottom:40px;
    box-shadow:0 18px 35px rgba(0,0,0,.08);
}
.section-title{
    font-size:1.9rem;
    color:var(--green);
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:28px;
}

table.editable{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}
table.editable th{
    background:var(--green);
    color:#fff;
    padding:12px;
}
table.editable td{
    border:1px solid #ddd;
    padding:14px;
    text-align:center;
}
table.editable tr:nth-child(even){background:#fafafa;}
table.editable td[contenteditable]:focus{
    outline:2px solid var(--yellow);
    background:#fffde7;
}

.note{
    margin-top:16px;
    font-size:.95rem;
    color:#d9534f;
    font-weight:bold;
}
.hint{
    margin-top:12px;
    font-size:.85rem;
    color:#999;
}

.save-btn{
    display:inline-block;
    margin-top:20px;
    background:var(--accent);
    color:#fff;
    padding:14px 50px;
    font-size:1.1rem;
    font-weight:bold;
    border:none;
    border-radius:999px;
    cursor:pointer;
    box-shadow:0 10px 25px rgba(255,111,97,.35);
}
.save-btn:hover{ opacity:.9; }
.save-btn:disabled{ opacity:.5; cursor:not-allowed; }

.save-msg{
    display:inline-block;
    margin-left:12px;
    font-size:.95rem;
    color:var(--green);
    font-weight:bold;
}

.back-link{
    display:inline-block;
    margin-top:30px;
    background:var(--green);
    color:#fff;
    padding:14px 40px;
    font-size:1.1rem;
    font-weight:bold;
    border-radius:999px;
    text-decoration:none;
    box-shadow:0 10px 25px rgba(45,106,79,.35);
}
.back-link:hover{ opacity:.9; }

footer{
    text-align:center;
    margin-top:70px;
    font-size:.85rem;
    color:#aaa;
}
</style>
</head>
<body>

<header class="hero">
    <h1>樂器清單</h1>
    <p>樂器搬運順序與負責人員</p>
</header>

<div class="container">

<section class="card">
    <h2 class="section-title">🥁 樂器搬運清單</h2>

    <table class="editable" id="instrTable">
        <thead>
            <tr>
                <th>上場順序</th>
                <th>樂器 / 任務</th>
                <th>負責人員</th>
            </tr>
        </thead>
        <tbody id="instrBody">
        </tbody>
    </table>

    <p class="note">※ 除協助定位之家長外，其餘家長放好樂器就下台。</p>
    <p class="hint">點擊表格欄位即可直接編輯，編輯完按「儲存」。</p>

    <div style="text-align:center;margin-top:24px;">
        <button class="save-btn" id="saveBtn" onclick="save()">儲存</button>
        <span class="save-msg" id="saveMsg"></span>
    </div>
</section>

<div style="text-align:center;">
    <a href="index.html" class="back-link">← 返回活動首頁</a>
</div>

<footer>© 116 國樂社春季出遊籌備小組</footer>

</div>

<script>
const tbody = document.getElementById("instrBody");
const saveBtn = document.getElementById("saveBtn");
const saveMsg = document.getElementById("saveMsg");

function renderTable(rows) {
  tbody.innerHTML = "";
  rows.forEach(r => {
    const tr = document.createElement("tr");
    tr.innerHTML =
      `<td>${r.order}</td>` +
      `<td contenteditable="true">${r.name}</td>` +
      `<td contenteditable="true">${r.person || ""}</td>`;
    tbody.appendChild(tr);
  });
}

function collectData() {
  const rows = [];
  tbody.querySelectorAll("tr").forEach(tr => {
    const tds = tr.querySelectorAll("td");
    rows.push({
      order: parseInt(tds[0].textContent),
      name: tds[1].textContent.trim(),
      person: tds[2].textContent.trim()
    });
  });
  return rows;
}

async function load() {
  try {
    const res = await fetch("/api/instruments");
    const data = await res.json();
    renderTable(data);
  } catch (e) {
    console.error("load failed", e);
  }
}

async function save() {
  saveBtn.disabled = true;
  saveMsg.textContent = "";
  try {
    const res = await fetch("/api/instruments", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(collectData())
    });
    const data = await res.json();
    if (data.ok) {
      saveMsg.textContent = "已儲存！";
      setTimeout(() => { saveMsg.textContent = ""; }, 2000);
    }
  } catch (e) {
    saveMsg.textContent = "儲存失敗，請重試";
    saveMsg.style.color = "#d9534f";
    setTimeout(() => { saveMsg.textContent = ""; saveMsg.style.color = ""; }, 3000);
  }
  saveBtn.disabled = false;
}

load();
</script>
</body>
</html>
