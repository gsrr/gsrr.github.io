<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>報名統計</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:"Noto Sans TC",sans-serif;
  background:#f5f7fa;
  padding:30px;
  color:#333;
}
h1{
  margin-bottom:20px;
}
.summary{
  display:flex;
  gap:20px;
  margin-bottom:30px;
  flex-wrap:wrap;
}
.box{
  background:#fff;
  border-radius:14px;
  padding:20px 26px;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
}
.box strong{
  font-size:1.6rem;
  color:#ff6f61;
}
table{
  width:100%;
  border-collapse:collapse;
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
}
th{
  background:#2d6a4f;
  color:#fff;
  padding:12px;
}
td{
  padding:10px;
  border-bottom:1px solid #eee;
  text-align:center;
}
tr:nth-child(even){
  background:#fafafa;
}
.small{
  font-size:.85rem;
  color:#666;
}
</style>
</head>

<body>

<h1>📊 報名統計</h1>

<div class="summary">
  <div class="box">總人數<br><strong id="totalPeople">-</strong></div>
  <div class="box">成童<br><strong id="adult">-</strong></div>
  <div class="box">幼童(博愛)<br><strong id="child">-</strong></div>
  <div class="box">女生特惠<br><strong id="female">-</strong></div>
  <div class="box">馬年/馬字/免票兒童<br><strong id="horse_free">-</strong></div>
</div>

<div class="summary">
  <div class="box">🚗 自行開車人數<br><strong id="drivePeople">-</strong></div>
  <div class="box">🚌 搭車人數<br><strong id="busPeople">-</strong></div>
  <div class="box">🍗 雞腿便當<br><strong id="bento_chicken">-</strong></div>
  <div class="box">🍖 排骨便當<br><strong id="bento_pork">-</strong></div>
  <div class="box">🥬 素食便當<br><strong id="bento_veg">-</strong></div>
  <div class="box">🍚 炒飯便當<br><strong id="bento_rice">-</strong></div>
</div>

<h2 style="margin:40px 0 16px;">📋 全部報名名單</h2>

<table>
<thead>
<tr>
  <th>#</th>
  <th>姓名</th>
  <th>成童</th>
  <th>幼童(博愛)</th>
  <th>女生特惠</th>
  <th>馬年/馬字/免票兒童</th>
  <th>便當</th>
  <th>交通方式</th>
  <th>總價(NT$)</th>
  <th>報名時間</th>
  <th>備註</th>
</tr>
</thead>
<tbody id="list"></tbody>
</table>

<script>
async function loadStats(){
  const stats = await fetch("/api/stats").then(r=>r.json());

  for(const k in stats){
    const el = document.getElementById(k);
    if(el) el.textContent = stats[k];
  }
}

async function loadList(){
  const list = await fetch("/api/signup").then(r=>r.json());
  const tbody = document.getElementById("list");
  tbody.innerHTML = "";

  list.forEach((r,i)=>{
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${i+1}</td>
      <td>${r.name || ""}</td>
      <td>${r.summary.adult || 0}</td>
      <td>${r.summary.child || 0}</td>
      <td>${r.summary.female || 0}</td>
      <td>${r.summary.horse_free || 0}</td>
      <td class="small">
        🍗${r.bento.chicken||0}
        🍖${r.bento.pork||0}
        🥬${r.bento.veg||0}
        🍚${r.bento.rice||0}
      </td>
      <td>${r.transport || ""}</td>
      <td>${r.total || 0}</td>
      <td class="small">${(r.createdAt||"").replace("T"," ").slice(0,16)}</td>
<td style="white-space:nowrap;">
  <textarea
    id="note-${i}"
    rows="2"
    style="
      width:160px;
      resize:none;
      font-size:0.85rem;
      vertical-align:middle;
    "
  >${r.note || ""}</textarea>

  <button
    onclick="saveNote(${i})"
    title="儲存備註"
    style="
      margin-left:4px;
      padding:0 6px;
      height:22px;
      font-size:0.8rem;
      border:1px solid #2d6a4f;
      border-radius:4px;
      background:#fff;
      color:#2d6a4f;
      cursor:pointer;
      vertical-align:middle;
    "
  >✓</button>
</td>

    `;
    tbody.appendChild(tr);
  });
}

loadStats();
loadList();


function saveNote(index){
  const textarea = document.getElementById(`note-${index}`);
  const note = textarea.value;

  fetch("/api/signup/note", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ index, note })
  })
  .then(r => r.json())
  .then(() => {
    textarea.style.background = "#e6f7ef";
    setTimeout(()=>{
      textarea.style.background = "";
    }, 600);
  })
  .catch(()=>{
    alert("❌ 備註儲存失敗");
  });
}
</script>

</body>
</html>
