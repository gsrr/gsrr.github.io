<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>活動報名表｜國樂社校外展演暨小人國參訪</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Noto Sans TC',sans-serif;
  background:#f4f7fb;
  padding:20px;
}
form{
  max-width:720px;
  margin:auto;
  background:#fff;
  padding:36px;
  border-radius:24px;
  box-shadow:0 12px 30px rgba(0,0,0,.1);
}
h1{text-align:center;margin-bottom:28px;}
.section{margin-bottom:32px;}
.section h2{
  font-size:1.3rem;
  margin-bottom:14px;
  color:#2d6a4f;
}
label{
  display:block;
  margin:10px 0 6px;
  font-weight:500;
}
input, select, textarea{
  width:100%;
  padding:10px 12px;
  border-radius:10px;
  border:1px solid #ccc;
  font-size:1rem;
}
.inline{
  display:flex;
  gap:14px;
  flex-wrap:wrap;
}
.inline > div{
  flex:1;
  min-width:160px;
}
button{
  padding:14px 20px;
  font-size:1rem;
  background:#ff6f61;
  color:#fff;
  border:none;
  border-radius:999px;
  cursor:pointer;
  box-shadow:0 6px 18px rgba(255,111,97,.45);
}
button.remove{
  background:#adb5bd;
  box-shadow:none;
  margin-top:14px;
}
button.remove:hover{
  background:#868e96;
}
.submit-btn{
  width:100%;
  font-size:1.25rem;
}
.person-card{
  border:1px dashed #ccc;
  padding:16px;
  border-radius:14px;
  margin-bottom:16px;
}
.summary{
  background:#f8f9fa;
  padding:20px;
  border-radius:16px;
}
.summary-row{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
}
.total{
  font-size:1.5rem;
  font-weight:700;
  text-align:right;
  color:#1b4332;
  margin-top:12px;
}
footer{
  text-align:center;
  margin-top:18px;
  font-size:.85rem;
  color:#888;
}

.checkbox-row{
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
  cursor: pointer;
}

.checkbox-row input{
  width: auto;
  margin: 0;
}

.radio-group{
  margin-top: 8px;
}

.radio-row{
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
  cursor: pointer;
}

.radio-row input{
  width: auto;
  margin: 0;
}

</style>
</head>

<body>

<form id="signupForm">
<h1>🎠 活動報名表</h1>

<!-- 基本資料 -->
<div class="section">
  <h2>👤 基本資料</h2>
  <label>姓名 *</label>
  <input type="text" name="name" required>

  <label>聯絡電話 *</label>
  <input type="tel" name="phone" required placeholder="09xxxxxxxx">

  <label>Email（選填）</label>
  <input type="email" name="email">

<label>交通方式 *</label>

<div class="radio-group" onchange="recalc()">
  <label class="radio-row">
    <input type="radio" name="transport" value="drive" required>
    <span>🚗 自行開車</span>
  </label>

  <label class="radio-row">
    <input type="radio" name="transport" value="bus">
    <span>🚌 搭乘遊覽車（初估每人 $350）</span>
  </label>
</div>

  <label>備註（選填）</label>
  <textarea name="note" rows="3" placeholder="如：晚到、特殊需求、備註事項"></textarea>
</div>

<!-- 參加人員 -->
<div class="section">
  <h2>🎫 參加人員名單</h2>
  <div id="peopleArea"></div>
  <button type="button" id="addPersonBtn">＋ 新增一位參加者</button>
</div>

<!-- 便當 -->
<div class="section">
<h2>🍱 便當訂購</h2>
<label>是否代訂便當</label>
<select name="lunch" id="lunchSelect">
  <option value="no">不需要</option>
  <option value="yes">需要</option>
</select>

<div id="bentoArea" style="display:none;margin-top:16px;">
  <div class="inline">
    <div><label>雞腿 $130</label><input type="number" name="bento_chicken" min="0" value="0"></div>
    <div><label>排骨 $120</label><input type="number" name="bento_pork" min="0" value="0"></div>
  </div>
  <div class="inline">
    <div><label>素食 $120</label><input type="number" name="bento_veg" min="0" value="0"></div>
    <div><label>炒飯 $100</label><input type="number" name="bento_rice" min="0" value="0"></div>
  </div>
</div>
</div>

<!-- 最終統計 -->
<div class="section">
  <h2>📊 最終統計</h2>
  <div class="summary">
    <div class="summary-row"><span>成童票</span><span id="sumAdult">0</span></div>
    <div class="summary-row"><span>幼童票(博愛票)</span><span id="sumChild">0</span></div>
    <div class="summary-row"><span>女生特惠票</span><span id="sumFemale">0</span></div>
    <div class="summary-row"><span>馬年/姓名含馬/免票兒童</span><span id="sumHorseFree">0</span></div>
    <div class="summary-row"><span>🍗 雞腿便當</span><span id="sumChicken">0</span></div>
    <div class="summary-row"><span>🍖 排骨便當</span><span id="sumPork">0</span></div>
    <div class="summary-row"><span>🥬 素食便當</span><span id="sumVeg">0</span></div>
    <div class="summary-row"><span>🍚 炒飯便當</span><span id="sumRice">0</span></div>
    <div class="summary-row"><span>🚌 遊覽車費用</span><span id="sumBus">—</span></div>
    <div class="total" id="totalPrice">$ 0</div>
  </div>
</div>

<button type="submit" class="submit-btn">送出報名</button>
</form>

<footer>※ 僅用於本次活動與保險用途</footer>

<script>
const form = document.getElementById("signupForm");
const peopleArea = document.getElementById("peopleArea");
const addPersonBtn = document.getElementById("addPersonBtn");
const lunchSelect = document.getElementById("lunchSelect");
const bentoArea = document.getElementById("bentoArea");

const sumAdult = document.getElementById("sumAdult");
const sumChild = document.getElementById("sumChild");
const sumFemale = document.getElementById("sumFemale");
const sumHorseFree = document.getElementById("sumHorseFree");
const sumBus = document.getElementById("sumBus");
const sumChicken = document.getElementById("sumChicken");
const sumPork    = document.getElementById("sumPork");
const sumVeg     = document.getElementById("sumVeg");
const sumRice    = document.getElementById("sumRice");
const totalPriceEl = document.getElementById("totalPrice");

let TICKET_CONF = null;

const BENTO_PRICE = { chicken:130, pork:120, veg:120, rice:100 };

/* 載入票價設定 */
async function loadTicketConfig(){
  const res = await fetch("/api/config/ticket");
  if (!res.ok) throw new Error("ticket config load failed");
  TICKET_CONF = await res.json();
}

/* 計算人數與金額（前端） */
function recalc(){
  const people = [...document.querySelectorAll(".person-card")];
  let count = { adult:0, child:0, female:0, horse_free:0 };
  let total = 0;

  people.forEach(p=>{
    const type = p.querySelector("select").value;
    count[type]++;
    if (TICKET_CONF) total += TICKET_CONF.tickets[type].price;
  });

  sumAdult.textContent = count.adult;
  sumChild.textContent = count.child;
  sumFemale.textContent = count.female;
  sumHorseFree.textContent = count.horse_free;

  sumChicken.textContent = form.bento_chicken.value || 0;
  sumPork.textContent    = form.bento_pork.value || 0;
  sumVeg.textContent     = form.bento_veg.value || 0;
  sumRice.textContent    = form.bento_rice.value || 0;

  ["chicken","pork","veg","rice"].forEach(k=>{
    total += Number(form["bento_"+k].value || 0) * BENTO_PRICE[k];
  });

  // 遊覽車：選 bus 時每人加 $350
  const BUS_PRICE = 350;
  const transportVal = form.transport?.value;
  const totalPeople = count.adult + count.child + count.female + count.horse_free;
  if (transportVal === "bus") {
    const busCost = totalPeople * BUS_PRICE;
    total += busCost;
    sumBus.textContent = `${totalPeople} 人 × $350 = $${busCost}`;
  } else {
    sumBus.textContent = "自行開車（不計）";
  }

  totalPriceEl.textContent = "$ " + total;
}

/* 新增參加者 */
addPersonBtn.onclick = ()=>{
  const div = document.createElement("div");
  div.className = "person-card";
  div.innerHTML = `
    <label>姓名 *</label>
    <input required>
    <label>身分證字號（保險用） *</label>
    <input required>
    <label>出生年月日（保險用） *</label>
    <input type="date" required>
    <label>身分別 *</label>
    <select>
      <option value="adult">成童（$730，含門票＋保險）</option>
      <option value="child">幼童/博愛（$520，含門票＋保險）</option>
      <option value="female">女生特惠（$428，含保險）</option>
      <option value="horse_free">馬年/姓名含馬/免票兒童（$40，含保險）</option>
    </select>
    <button type="button" class="remove">移除此參加者</button>
  `;
  div.querySelector(".remove").onclick = ()=>{ div.remove(); recalc(); };
  div.onchange = recalc;
  peopleArea.appendChild(div);
  recalc();
};

/* 便當顯示 */
lunchSelect.onchange = ()=>{
  const need = lunchSelect.value === "yes";
  bentoArea.style.display = need ? "block" : "none";

  if (!need) {
    ["chicken","pork","veg","rice"].forEach(k=>{
      form["bento_"+k].value = 0;
    });
    recalc();
  }
};
bentoArea.oninput = recalc;

/* 送出表單 → POST /api/signup */
form.addEventListener("submit", async e=>{
  e.preventDefault();

  const people = [...document.querySelectorAll(".person-card")].map(p=>({
    name: p.querySelector("input:nth-of-type(1)").value.trim(),
    idno: p.querySelector("input:nth-of-type(2)").value.trim(),
    birthday: p.querySelector("input[type=date]").value,
    type: p.querySelector("select").value
  }));

  if (people.length === 0) {
    alert("請至少新增一位參加者");
    return;
  }

  const payload = {
    name: form.name.value.trim(),
    phone: form.phone.value.trim(),
    email: form.email.value.trim(),
    note: form.note.value.trim(),   // ← 新增這行
    transport: form.transport.value, // ← 新增
    people,
    bento: {
      chicken: Number(form.bento_chicken.value||0),
      pork:    Number(form.bento_pork.value||0),
      veg:     Number(form.bento_veg.value||0),
      rice:    Number(form.bento_rice.value||0)
    },
    summary: {
      adult: Number(sumAdult.textContent),
      child: Number(sumChild.textContent),
      female: Number(sumFemale.textContent),
      horse_free: Number(sumHorseFree.textContent)
    },
    total: Number(totalPriceEl.textContent.replace(/[^\d]/g,""))
  };

  const res = await fetch("/api/signup",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(payload)
  });

  if (!res.ok) {
    alert("❌ 送出失敗");
    return;
  }

  alert("✅ 報名成功");
  form.reset();
  peopleArea.innerHTML = "";
  recalc();
  window.location.href = "stats.html";
});

/* 初始化 */
(async ()=>{
  await loadTicketConfig();
  recalc();
})();
</script>

</body>
</html>
